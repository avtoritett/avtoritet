</head>
<body>
    <header>
        <div class="header-left">
            <a href="index.html" class="logo-link">
                 <img src="logo.png" alt="Логотип компании">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="cotacti.html">Контакты</a></li>
                <li><a href="about.html">О нас</a></li>
            </ul>
        </nav>
         <div class="top-right">
                <input type="text" placeholder="Поиск...">
                <a href="lk.html"><img src="Group 2.png"></img></a>
                <a href="by.html"><img src="image 1.png"></img></a>
            </div>
    </header>

    <main>
       <div class="breadcrumb">
            <a style="color: black; padding-left: 2%;" href="index.html">Главная</a> > <span>Личный кабинет</span>
        </div> 

    <section class="register-section">
      <h1>Регистрация</h1>
      <form id="registerForm">
        <input type="email" id="email" placeholder="Введите E-mail" required>
        <input type="password" id="password" placeholder="Введите пароль" required>
        <input type="password" id="confirmPassword" placeholder="Подтвердите пароль" required>

        <label class="checkbox-label">
          <input type="checkbox" id="agree" required>
          Я согласен с политикой конфиденциальности и с обработкой персональных данных
        </label>

        <button type="submit">Зарегистрироваться</button>
      </form>
    </section>
    <script>
    document.getElementById("registerForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const pass = document.getElementById("password").value;
      const confirm = document.getElementById("confirmPassword").value;
      if (pass !== confirm) {
        alert("Пароли не совпадают");
        return;
      }
      localStorage.setItem("email", email);
      localStorage.setItem("password", pass);
      window.location.href = "profile.html";
    });
  </script>
  </main>
   <footer class="footer">
        <div class="footer-container">
            <!-- Логотип -->
            <div class="logo">
                <a href="index.html" class="logo-link">
                 <img src="logo.png" alt="Логотип компании">
            </a>
            </div>

            <!-- Блок "Компания" -->
            <div class="footer-column">
                <h3>Компания</h3>
                <ul>
                    <li><a href="about.html">О нас</a></li>
                    <li><a href="cotacti.html">Контакты</a></li>
                </ul>
            </div>

            <!-- Блок "Полезное" -->
            <div class="footer-column">
                <h3>Полезное</h3>
                <ul>
                    <li><a href="delivery.html">Оплата и доставка</a></li>
                    <li><a href="return.html">Условия возврата</a></li>
                </ul>
            </div>

            <!-- Блок "Контакты" -->
            <div class="footer-column contacts">
                <h3>Контакты</h3>
                <div class="social-links">
                    <a href="#"><img src="social_15707835.png" alt="VK"></a>
                    <a href="#"><img src="telegram_black_logo_icon_147073 1.png" alt="Telegram"></a>
                </div>
                <div class="contact-info">
                   <p>📞 <a href="tel:+79279744030">+7 (927) 974-40-30</a></p>
                    <p>
                        ✉<span id="email" class="clickable-email"> info@avtoritet.ru</span>
                    </p>
                    <div id="feedback" aria-live="polite"></div>

                </div>
            </div>
        </div>

        <!-- Копирайт -->
        <div class="copyright">
            <p>© 2026 АВТОРИТЕТ</p>
        </div>
        <script>
    document.addEventListener('DOMContentLoaded', () => {
      const emailElement = document.getElementById('email');
      const feedback = document.getElementById('feedback');

      emailElement.addEventListener('click', async () => {
        const email = emailElement.textContent;

        try {
          await navigator.clipboard.writeText(email);
          
          // Показываем успешный результат
          feedback.textContent = 'Email скопирован!';
          feedback.className = 'feedback success';
          
          // Убираем сообщение через 3 секунды
          setTimeout(() => {
            feedback.textContent = '';
          }, 3000);
          
        } catch (err) {
          console.error('Ошибка копирования:', err);
          feedback.textContent = 'Не удалось скопировать. Попробуйте вручную.';
          feedback.className = 'feedback error';
        }
      });
    });
  </script>
    </footer>
</body>
</html>
