</head>
<body>
    <header>
        <div class="header-left">
            <a href="index.html" class="logo-link">
                 <img src="logo.png" alt="Логотип компании">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="cotacti.html">Контакты</a></li>

         <div class="top-right">

                <a href="lk.html"><img src="Group 2.png"></img></a>

    <main>
       <div class="breadcrumb">
            <a style="color: black; padding-left: 2%;" href="index.html">Главная</a> > <span>Корзина</span>
        </div> 
        <main>
    <section class="register-section">
      <h1>Корзина</h1>
      <div id="cartItems"></div>
      <p><strong>Итого:</strong> <span id="total">0</span> руб.</p>
      <button onclick="checkout()">Оформить заказ</button>
    </section>
  </main>

  

  <script>
    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    function renderCart() {
      const container = document.getElementById("cartItems");
      container.innerHTML = "";
      let sum = 0;
      cart.forEach((item, i) => {
        const el = document.createElement("p");
        el.textContent = item.name + " — " + item.price + " руб.";
        container.appendChild(el);
        sum += item.price;
      });
      document.getElementById("total").textContent = sum;
    }

    function checkout() {
      window.location.href = "cheakout.html";
    }

    renderCart();
  </script>
  <script>
    // Очистка корзины при загрузке страницы
    localStorage.removeItem("cart");
  </script>
    </main>

   <footer class="footer">
        <div class="footer-container">
            <!-- Логотип -->
            <div class="logo">
                <a href="index.html" class="logo-link">
                 <img src="logo.png" alt="Логотип компании">
            </a>
            </div>

            <!-- Блок "Компания" -->
            <div class="footer-column">
                <h3>Компания</h3>
                <ul>
                    <li><a href="about.html">О нас</a></li>
                    <li><a href="cotacti.html">Контакты</a></li>
                </ul>
            </div>

            <!-- Блок "Полезное" -->
            <div class="footer-column">

                    <li><a href="return.html">Условия возврата</a></li>
                </ul>
            </div>

            <!-- Блок "Контакты" -->
            <div class="footer-column contacts">
                <h3>Контакты</h3>
                <div class="social-links">
                    <a href="#"><img src="social_15707835.png" alt="VK"></a>
                    <a href="#"><img src="telegram_black_logo_icon_147073 1.png" alt="Telegram"></a>
                </div>
                <div class="contact-info">
                   <p>📞 <a href="tel:+79279744030">+7 (927) 974-40-30</a></p>
                    <p>
                        ✉<span id="email" class="clickable-email"> info@avtoritet.ru</span>
                    </p>
                    <div id="feedback" aria-live="polite"></div>
                </div>
            </div>
        </div>

        <!-- Копирайт -->
        <div class="copyright">
            <p>© 2026 АВТОРИТЕТ</p>
        </div>
    </footer>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
      const emailElement = document.getElementById('email');
      const feedback = document.getElementById('feedback');

      emailElement.addEventListener('click', async () => {
        const email = emailElement.textContent;

        try {
          await navigator.clipboard.writeText(email);
          
          // Показываем успешный результат
          feedback.textContent = 'Email скопирован!';
          feedback.className = 'feedback success';
          
          // Убираем сообщение через 3 секунды
          setTimeout(() => {
            feedback.textContent = '';
          }, 3000);
          
        } catch (err) {
          console.error('Ошибка копирования:', err);
          feedback.textContent = 'Не удалось скопировать. Попробуйте вручную.';
          feedback.className = 'feedback error';
        }
      });
    });
  </script>
</body>
