<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <link rel="stylesheet" href="style7.css">
</head>
<body>
    <header>
        <div class="header-left">
            <a href="index.html" class="logo-link">
                 <img src="logo.png" alt="Логотип компании">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="cotacti.html">Контакты</a></li>
                <li><a href="about.html">О нас</a></li>
            </ul>
        </nav>
         <div class="top-right">
                <input type="text" placeholder="Поиск...">
                <a href="lk.html"><img src="Group 2.png"></img></a>
                <a href="by.html"><img src="image 1.png"></img></a>
            </div>
    </header>
    <main>
        <section class="register-section">
      <h1>Личный кабинет</h1>
      <form id="profileForm">
        <input type="text" id="firstName" placeholder="Имя">
        <input type="text" id="lastName" placeholder="Фамилия">
        <input type="tel" id="phone" placeholder="Телефон">
        <input type="email" id="email" placeholder="E-mail" >

        <h2>Смена пароля</h2>
        <input type="password" id="currentPassword" placeholder="Текущий пароль">
        <input type="password" id="newPassword" placeholder="Новый пароль">

        <label class="checkbox-label">
          <input type="checkbox" id="newsletter">
          Я хочу получать рассылку электронных новостей шоурума
        </label>

        <button type="submit">Сохранить</button>
        <button type="button" onclick="logout()">Выход</button>
        </form>
      <div id="confirmation" style="display:none; margin-top: 20px; padding: 15px; background: #e8f5e9; border: 1px solid #4caf50; border-radius: 6px;">
        <h3>Сохранённые данные:</h3>
        <p><strong>Имя:</strong> <span id="outFirstName"></span></p>
        <p><strong>Фамилия:</strong> <span id="outLastName"></span></p>
        <p><strong>Телефон:</strong> <span id="outPhone"></span></p>
        <p><strong>Подписка:</strong> <span id="outNewsletter"></span></p>
        </div>
         </section>
    </main>
    <script>
    const email = localStorage.getItem("email");
    const saved = JSON.parse(localStorage.getItem("profileData")) || {};

    document.getElementById("email").value = email || '';
    document.getElementById("firstName").value = saved.firstName || '';
    document.getElementById("lastName").value = saved.lastName || '';
    document.getElementById("phone").value = saved.phone || '';
    document.getElementById("newsletter").checked = saved.newsletter || false;

    document.getElementById("profileForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const current = document.getElementById("currentPassword").value;
      const newPass = document.getElementById("newPassword").value;
      const stored = localStorage.getItem("password");

      if (current && current !== stored) {
        alert("Неверный текущий пароль");
        return;
      }

      if (newPass) {
        localStorage.setItem("password", newPass);
      }

      const profile = {
        firstName: document.getElementById("firstName").value,
        lastName: document.getElementById("lastName").value,
        phone: document.getElementById("phone").value,
        newsletter: document.getElementById("newsletter").checked
      };

      localStorage.setItem("profileData", JSON.stringify(profile));
      document.getElementById("outFirstName").textContent = profile.firstName;
document.getElementById("outLastName").textContent = profile.lastName;
document.getElementById("outPhone").textContent = profile.phone;
document.getElementById("outNewsletter").textContent = profile.newsletter ? "Да" : "Нет";
window.location.href = "cabinet.html";
    });

    function logout() {
      localStorage.clear();
      window.location.href = "register.html";
    }
  </script>
    
   <footer class="footer">
        <div class="footer-container">
            <!-- Логотип -->
            <div class="logo">
                <a href="index.html" class="logo-link">
                 <img src="logo.png" alt="Логотип компании">
            </a>
            </div>

            <!-- Блок "Компания" -->
            <div class="footer-column">
                <h3>Компания</h3>
                <ul>
                    <li><a href="about.html">О нас</a></li>
                    <li><a href="cotacti.html">Контакты</a></li>
                </ul>
            </div>

            <!-- Блок "Полезное" -->
            <div class="footer-column">
                <h3>Полезное</h3>
                <ul>
                    <li><a href="delivery.html">Оплата и доставка</a></li>
                    <li><a href="return.html">Условия возврата</a></li>
                </ul>
            </div>

            <!-- Блок "Контакты" -->
            <div class="footer-column contacts">
                <h3>Контакты</h3>
                <div class="social-links">
                    <a href="#"><img src="social_15707835.png" alt="VK"></a>
                    <a href="#"><img src="telegram_black_logo_icon_147073 1.png" alt="Telegram"></a>
                </div>
                <div class="contact-info">
                   <p>📞 <a href="tel:+79279744030">+7 (927) 974-40-30</a></p>
                    <p>
                        ✉<span id="email" class="clickable-email"> info@avtoritet.ru</span>
                    </p>
                    <div id="feedback" aria-live="polite"></div>

                </div>
            </div>
        </div>

        <!-- Копирайт -->
        <div class="copyright">
            <p>© 2026 АВТОРИТЕТ</p>
        </div>
        <script>
    document.addEventListener('DOMContentLoaded', () => {
      const emailElement = document.getElementById('email');
      const feedback = document.getElementById('feedback');

      emailElement.addEventListener('click', async () => {
        const email = emailElement.textContent;

        try {
          await navigator.clipboard.writeText(email);
          
          // Показываем успешный результат
          feedback.textContent = 'Email скопирован!';
          feedback.className = 'feedback success';
          
          // Убираем сообщение через 3 секунды
          setTimeout(() => {
            feedback.textContent = '';
          }, 3000);
          
        } catch (err) {
          console.error('Ошибка копирования:', err);
          feedback.textContent = 'Не удалось скопировать. Попробуйте вручную.';
          feedback.className = 'feedback error';
        }
      });
    });
  </script>
    </footer>
</body>
</html>
